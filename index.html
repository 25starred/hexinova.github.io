<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jasper Went</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1c1e;
            color: #e2e2e2;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.15rem;
            color: #b0b3b8;
            margin-bottom: 32px;
            font-weight: 400;
        }

        .btn-work {
            display: inline-block;
            background-color: #111214;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 48px;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .btn-work:hover {
            background-color: #24262a;
            transform: translateY(-1px);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 32px;
        }

        .social-links a {
            color: #c4c4c4;
            font-size: 2.5rem;
            transition: color 0.2s ease, transform 0.2s ease;
            text-decoration: none;
        }

        .social-links a:hover {
            color: #ffffff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Jasper Went</h1>
        <p>An independent developer located in the Carribean 🏝️</p>
        
        <a href="https://github.com/25starred" class="btn-work">See my work</a>
        
        <div class="social-links">
            <a href="https://www.youtube.com/@25starred" target="_blank" rel="noopener noreferrer" title="YouTube">
                <i class="fa-brands fa-youtube"></i>
            </a>
            <a href="https://github.com/25starred" target="_blank" rel="noopener noreferrer" title="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="mailto:hello@jasperr.xyz" title="Email">
                <i class="fa-solid fa-envelope"></i>
            </a>
        </div>
    </div>

</body>
</html>
